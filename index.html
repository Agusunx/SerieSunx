<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SerieSunx</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<script id="script-base-data" type="text/plain" style="display:none"></script>

<nav id="navbar">
    <a href="#" class="logo" onclick="location.reload();return false">Series<span>Sunx</span></a>
    <div class="nav-tabs">
        <button class="nav-tab active" data-cat="Todo">Todo</button>
        <button class="nav-tab" data-cat="Anime">Anime</button>
        <button class="nav-tab" data-cat="Series">Series</button>
        <button class="nav-tab" data-cat="Películas">Películas</button>
    </div>
    <div class="nav-right">
        <button class="btn-icon" onclick="verRandom()" title="Sorprendeme">🎲</button>
        <div class="search-wrap">
            <span class="sico">⌕</span>
            <input type="text" id="buscador" placeholder="Buscar...">
        </div>
        <button class="btn-admin-open" onclick="abrirAdmin()" title="Admin">⚙</button>
    </div>
</nav>

<section id="hero">
    <div id="hero-backdrop"></div>
    <div class="hero-vignette"></div>
    <div class="hero-content">
        <div id="hero-tipo" class="hero-tag"></div>
        <h1 id="hero-titulo"></h1>
        <p id="hero-desc"></p>
        <div class="hero-meta">
            <span id="hero-anio"></span>
            <span id="hero-prog" style="display:none"></span>
        </div>
        <div class="hero-btns">
            <button id="btn-hero-play" class="btn-primary hidden">▶ Reproducir</button>
            <button id="btn-hero-eps" class="btn-primary hidden">☰ Ver episodios</button>
        </div>
    </div>
    <div id="hero-dots"></div>
</section>

<section id="sec-continuar" class="csec hidden">
    <h2 class="stitle">▶ Continuar viendo</h2>
    <div class="srow" id="grid-continuar"></div>
</section>

<section id="sec-favs" class="csec hidden">
    <h2 class="stitle">♥ Mis favoritos</h2>
    <div class="srow" id="grid-favs"></div>
</section>

<section class="csec">
    <h2 class="stitle">📚 Biblioteca</h2>
    <div id="grid-peliculas" class="card-grid"></div>
    <p id="sin-resultados" class="hidden" style="text-align:center;color:#555;padding:60px 20px;font-size:0.9rem">Sin resultados.</p>
</section>

<div id="modal-overlay" class="hidden" onclick="if(event.target===this)cerrarModal()">
    <div id="modal-box">
        <button class="modal-x" onclick="cerrarModal()">✕</button>
        <div id="player-wrap">
            <video id="reproductor" controls class="hidden" playsinline></video>
        </div>
        <div id="modal-body">
            <div id="modal-backdrop"></div>
            <div class="modal-inner">
                <div class="modal-head">
                    <div>
                        <h2 id="modal-titulo"></h2>
                        <div class="modal-badges">
                            <span id="modal-anio" class="mbadge"></span>
                            <span id="modal-tipo" class="mbadge accent"></span>
                            <span id="modal-eps-n" class="mbadge"></span>
                        </div>
                    </div>
                    <button id="modal-fav" class="btn-fav" onclick="toggleFavModal()">♡ Favorito</button>
                </div>
                <p id="modal-desc"></p>
                <div id="zona-eps" class="hidden">
                    <div class="eps-lbl">EPISODIOS</div>
                    <div id="lista-eps"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="admin-overlay" class="hidden" onclick="if(event.target===this)cerrarAdmin()">
    <div id="admin-box">
        <button class="modal-x" onclick="cerrarAdmin()">✕</button>

        <div id="admin-login">
            <div class="admin-login-inner">
                <div class="admin-logo">Series<span>Sunx</span> Admin</div>
                <div class="al-field"><label>Usuario</label><input type="text" id="l-user" placeholder="Usuario" autocomplete="username" onkeydown="if(event.key==='Enter')adminLogin()"></div>
                <div class="al-field"><label>Contraseña</label><input type="password" id="l-pass" placeholder="Contraseña" autocomplete="current-password" onkeydown="if(event.key==='Enter')adminLogin()"></div>
                <button class="btn-login" onclick="adminLogin()">Entrar</button>
                <div id="login-err" style="display:none;color:#ff6b8a;font-size:0.8rem;margin-top:8px;text-align:center">Usuario o contraseña incorrectos</div>
            </div>
        </div>

        <div id="admin-panel" class="hidden">
            <div class="admin-layout">
                <div class="admin-sidebar">
                    <div class="admin-si">
                        <div class="atipo-row">
                            <button class="atipo-btn ta active" data-tipo="anime" onclick="adminSetTipo('anime',this)">🎌 Anime</button>
                            <button class="atipo-btn ts" data-tipo="serie" onclick="adminSetTipo('serie',this)">📺 Serie</button>
                            <button class="atipo-btn tp" data-tipo="pelicula" onclick="adminSetTipo('pelicula',this)">🎬 Peli</button>
                        </div>
                        <input type="hidden" id="admin-tipo-val" value="anime">

                        <div class="admin-poster-wrap" id="admin-poster-wrap">
                            <img id="admin-poster-img" src="" alt="" style="display:none;width:100%;height:100%;object-fit:cover">
                            <div id="admin-poster-ph" style="display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;color:#555;font-size:0.78rem"><span style="font-size:1.8rem">🖼️</span>Póster</div>
                        </div>

                        <div class="af"><label>Título *</label><input type="text" id="admin-titulo" placeholder="Ej: Interestelar"></div>
                        <div class="af"><label>Póster (URL)</label><input type="url" id="admin-imagen" placeholder="https://..." oninput="adminPosterPreview(this.value)"></div>
                        <div class="af"><label>Año</label><input type="number" id="admin-anio" placeholder="2024"></div>
                        <div class="af"><label>Descripción</label><textarea id="admin-desc" placeholder="Sinopsis..."></textarea></div>

                        <hr class="ahr">

                        <div id="admin-sec-peli" style="display:none">
                            <div class="af"><label>Link del video *</label><input type="url" id="admin-url-peli" placeholder="https://..."></div>
                        </div>

                        <div id="admin-sec-serie">
                            <div class="af">
                                <label>Links (uno por línea) *</label>
                                <textarea id="admin-links" placeholder="Links de episodios..." oninput="adminContarLinks()"></textarea>
                                <div id="admin-link-count" style="display:none"></div>
                            </div>
                            <div class="af"><label>Nombres (opcional)</label><textarea id="admin-names" placeholder="Cap 1..."></textarea></div>
                        </div>

                        <button class="btn-admin-save" onclick="adminAgregar()">＋ Agregar</button>
                        <div id="admin-form-err" style="display:none;color:#ff6b8a;font-size:0.78rem;margin-top:8px"></div>
                    </div>
                </div>

                <div class="admin-main">
                    <div class="admin-main-head">
                        <div>
                            <div class="admin-main-title">Biblioteca extras</div>
                        </div>
                        <button class="btn-dl" onclick="adminDescargar()">⬇ Descargar script.js</button>
                    </div>
                    <div id="admin-lista"></div>
                    <div id="admin-empty" style="display:none;text-align:center;padding:40px;color:#555;">📭 Vacío</div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="toast" class="hidden"></div>

<script src="script.js"></script>
<script>
fetch('script.js').then(r => r.text()).then(t => {
    document.getElementById('script-base-data').textContent = t;
}).catch(() => {});
</script>
</body>
</html>
